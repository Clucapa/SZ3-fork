name: Build

on: [push]

env:
  BUILD_TYPE: Release

jobs:
  check-non-ascii:
    name: Check non-ASCII
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check for non-ASCII characters in C/C++ files
        run: |
          EXTENSIONS="*.h *.hpp *.c *.cpp *.cxx *.hxx"

          if git grep -P '[^\x00-\x7F]$' -- $EXTENSIONS; then
            echo "::error::Line ends with non-ASCII character!"
            exit 1
          fi

          has_error=0
          while IFS= read -r line; do
            before_comment="${line%%//*}"
            if echo "$before_comment" | grep -qP '[^\x00-\x7F]'; then
              echo "$line"
              has_error=1
            fi
          done < <(git grep -P '[^\x00-\x7F]' -- $EXTENSIONS || true)

          if [ $has_error -eq 1 ]; then
            echo "::error::Non-ASCII character found before // comment (or in line without //)"
            exit 1
          fi

          echo "No disallowed non-ASCII characters found."

  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install HDF5
        run: |
          sudo apt-get update
          sudo apt-get install -y libhdf5-dev

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DBUILD_H5Z_FILTER=ON

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel 4

      - name: Run QoI-related tests
        run: |
          TESTS="test_qpet_qoi test_qpet_eb_provider test_qpet_regional"
          all_passed=0
          for t in $TESTS; do
            if ./test/bin/$t; then
              echo "✓ $t passed"
            else
              echo "✗ $t FAILED"
              all_passed=1
            fi
          done
          if [ $all_passed -eq 1 ]; then
            echo "::error::Some QoI tests failed"
            exit 1
          fi
          echo "All QoI tests passed"

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Bootstrap vcpkg & install HDF5
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
          cd C:\vcpkg
          .\bootstrap-vcpkg.bat
          .\vcpkg.exe install hdf5:x64-windows
          echo "VCPKG_ROOT=C:\vcpkg" | Out-File -FilePath $Env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure
        shell: pwsh
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_TOOLCHAIN_FILE=C:\vcpkg\scripts\buildsystems\vcpkg.cmake `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DBUILD_H5Z_FILTER=ON

      - name: Build
        shell: pwsh
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel 4
