name: Build

on: [push]

env:
  BUILD_TYPE: Release

jobs:
  check-non-ascii:
    name: Check non-ASCII
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check for non-ASCII characters in C/C++ files
        run: |
          if git grep -P '[^\x00-\x7F]' -- \
              '*.h' '*.hpp' '*.c' '*.cpp' '*.cxx' '*.hxx'; then
            echo "::error::Non-ASCII characters found in C/C++ source files!"
            exit 1
          fi
          echo "No non-ASCII characters found in C/C++ files."

  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install HDF5
        run: |
          sudo apt-get update
          sudo apt-get install -y libhdf5-dev

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DBUILD_H5Z_FILTER=ON

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel 4

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Bootstrap vcpkg & install HDF5
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
          cd C:\vcpkg
          .\bootstrap-vcpkg.bat
          .\vcpkg.exe install hdf5:x64-windows
          echo "VCPKG_ROOT=C:\vcpkg" | Out-File -FilePath $Env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure
        shell: pwsh
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_TOOLCHAIN_FILE=C:\vcpkg\scripts\buildsystems\vcpkg.cmake `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DBUILD_H5Z_FILTER=ON

      - name: Build
        shell: pwsh
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel 4
